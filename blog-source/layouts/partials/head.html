<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}Atendimento veterinário domiciliar em Canoas, Esteio, Nova Santa Rita e Porto Alegre. Vacinas, consultas e exames no conforto do seu lar.{{ end }}">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#38B2AC">
<link rel="canonical" href="{{ .Permalink }}">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
<link rel="shortcut icon" href="/favicon.ico">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}Leve o melhor cuidado veterinário para dentro da sua casa. Atendimento humanizado, vacinas e exames em Canoas e região.{{ end }}">
<meta property="og:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}https://cuidapet.vet.br/images/hero-vet.webp{{ end }}">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="{{ .Permalink }}">
<meta property="twitter:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
<meta property="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}Leve o melhor cuidado veterinário para dentro da sua casa. Atendimento humanizado, vacinas e exames em Canoas e região.{{ end }}">
<meta property="twitter:image" content="{{ if .Params.image }}{{ .Params.image | absURL }}{{ else }}https://cuidapet.vet.br/images/hero-vet.webp{{ end }}">

<link rel="stylesheet" href="/style.css">

<!-- Preconnect and Preload -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

<noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
